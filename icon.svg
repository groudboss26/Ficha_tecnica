<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#101d18" />
  <!-- Waves inside icon background -->
  <path d="M0,450 C150,420 350,480 512,450 L512,512 L0,512 Z" fill="#24392f" opacity="0.4" />
  <path d="M0,470 C120,450 380,490 512,470 L512,512 L0,512 Z" fill="#4bb6a8" opacity="0.2" />
  
  <!-- Sushi Roll -->
  <g transform="translate(256, 230)">
    <!-- Outer Rice ring (white cream) -->
    <ellipse cx="0" cy="0" rx="140" ry="90" fill="#f4efde" stroke="#1d3128" stroke-width="10" />
    <!-- Nori Wrap (dark green) outline -->
    <ellipse cx="0" cy="0" rx="150" ry="100" fill="none" stroke="#101d18" stroke-width="12" />
    
    <!-- Salmon Core (coral orange) -->
    <ellipse cx="-25" cy="5" rx="55" ry="38" fill="#e2643a" />
    <!-- Salmon texture lines -->
    <path d="M-60, 0 C-40,-15 -20,-10 0,5" stroke="#f4efde" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6" />
    <path d="M-75, 10 C-50,-10 -30,-5 -10,15" stroke="#f4efde" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6" />
    
    <!-- Wasabi paste (green) -->
    <path d="M30,-20 C45,-30 65,-25 70,-10 C75,5 60,15 45,15 C30,15 20,5 25,-10 Z" fill="#a4c93e" />
    <!-- Cucumber strip (sea green) -->
    <path d="M10,25 C25,35 45,30 50,15 C55,0 40,-10 25,-10 C10,-10 0,0 5,15 Z" fill="#4bb6a8" />
  </g>
  
  <!-- Stylized Chopsticks in gold -->
  <line x1="120" y1="100" x2="392" y2="380" stroke="#dd9a4b" stroke-width="14" stroke-linecap="round" opacity="0.85" />
  <line x1="100" y1="130" x2="412" y2="350" stroke="#dd9a4b" stroke-width="10" stroke-linecap="round" opacity="0.85" />
</svg>
